services:
  postgres:
    image: postgres:16-alpine
    container_name: torafinance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: torafinance
      POSTGRES_USER: torafinance
      POSTGRES_PASSWORD: torafinance_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U torafinance -d torafinance"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
